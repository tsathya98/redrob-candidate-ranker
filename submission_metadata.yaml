ai_usage_summary: |
  Used Claude (Claude Code) for challenge analysis, documentation, architecture design, and code
  scaffolding/review. Ranking design and engineering decisions are the team's own; no candidate data is
  sent to any LLM and the ranking step makes no network/LLM calls (CPU-only, offline).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  TODO (<=200 words). Hybrid explainable CPU-only ranker: honeypot/impossibility filter, JD-encoded
  hard-gates + soft-penalties (services-only, research-only, recent-LLM-only, title-chaser, CV/speech-only,
  location), semantic relevance (precomputed embeddings + BM25) over career-description text to catch
  plain-language fits, structured scoring (title/career evidence, 5-9yr band, skill depth corroborated by
  assessment scores, education), and a bounded behavioral-availability multiplier from redrob_signals.
  Reasoning is templated from real profile facts (no hallucination). See docs/.

