ai_usage_summary: |
  Used Claude (Claude Code) for challenge analysis, documentation, architecture design, and code
  scaffolding/review. Ranking design and engineering decisions are the team's own; no candidate data is
  sent to any LLM and the ranking step makes no network/LLM calls (CPU-only, offline).

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Hybrid, explainable, CPU-only ranker. Pipeline: (1) honeypot/impossibility filter forces logically
  impossible profiles out; (2) JD encoded as a weighted, gated rubric with hard-gates + soft-penalties
  (services-only, research-only, recent-LLM-only, title-chaser, CV/speech-only, location); (3) relevance =
  lexical concept matching over career descriptions blended with semantic similarity from precomputed
  bge-small-en-v1.5 embeddings (catches plain-language fits); (4) a bge-reranker-v2-m3 cross-encoder,
  precomputed offline against the fixed JD, takes half-authority over the top tier for NDCG@10; (5) structured
  scoring (title/career evidence, 5-9yr band, skill depth corroborated by assessment scores, education) x a
  bounded behavioral-availability multiplier from redrob_signals. Embeddings/reranker run offline (GPU);
  rank.py loads cached JSON and runs CPU-only, offline, <3min. Reasoning is templated from real profile facts
  (no LLM, no hallucination). See docs/.

